<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#1e1f22">
    <link rel="manifest" href="manifest.json">
    <title>Marginalia</title>
    <style>
        :root {
            --bg: #1e1f22;
            --panel: #2a2c31;
            --text: #e6e6e6;
            --accent: #c9a86a;
        }
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            color: var(--text);
            font-family: Georgia, serif;
            overflow: hidden;
        }
        #splash {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 60px;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        #splash.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #app {
            display: none;
            height: 100vh;
            flex-direction: column;
        }
        #toolbar {
            background: var(--panel);
            padding: 8px;
            display: flex;
            gap: 12px;
            align-items: center;
            border-bottom: 1px solid #444;
        }
        #status {
            background: var(--panel);
            padding: 4px 12px;
            font-size: 0.85em;
            color: var(--accent);
            border-top: 1px solid #444;
        }
        .group { display: flex; gap: 8px; align-items: center; }
        #main { flex: 1; display: flex; overflow: hidden; position: relative; }
        #left { width: 35%; background: var(--panel); border-right: 1px solid #444; }
        #right { flex: 1; background: var(--bg); }
        textarea {
            width: 100%;
            height: 100%;
            background: transparent;
            color: var(--text);
            border: none;
            outline: none;
            padding: 20px;
            resize: none;
            font-size: 1.1em;
            line-height: 1.6;
            box-sizing: border-box;
        }
        button {
            background: #444;
            color: white;
            border: 1px solid #666;
            padding: 5px 12px;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover { background: #555; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="splash">
        <h1>Marginalia</h1>
        <blockquote>"Writing is the only way I have to keep my life from being a blur."</blockquote>
        <p>Loading your desk...</p>
    </div>

    <div id="app">
        <div id="toolbar">
            <div class="group">
                <button id="btnNew">New Project</button>
            </div>
            <div style="flex:1"></div>
            <div class="group">
                <span style="font-size: 0.8em; opacity: 0.6;">Guided | Free</span>
            </div>
        </div>

        <div id="main">
            <div id="left">
                <textarea id="guidedPanel" placeholder="Guided writing / Prompts..."></textarea>
            </div>
            <div id="right">
                <textarea id="freePanel" placeholder="Start your draft here..."></textarea>
            </div>
        </div>

        <div id="status">Ready</div>
    </div>

    <script>
        // 1. SERVICE WORKER REGISTRATION (Offline Support)
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("./sw.js").catch(err => console.log("SW Export failed", err));
            });
        }

        // 2. ELEMENT SELECTIONS
        const splash = document.getElementById('splash');
        const app = document.getElementById('app');
        const guidedPanel = document.getElementById('guidedPanel');
        const freePanel = document.getElementById('freePanel');
        const status = document.getElementById('status');
        const btnNew = document.getElementById('btnNew');
        let autosaveTimer;

        // 3. INITIAL LOAD LOGIC
        window.addEventListener('DOMContentLoaded', () => {
            // Load existing data
            const savedData = localStorage.getItem('marginalia_autosave');
            if (savedData) {
                try {
                    const parsed = JSON.parse(savedData);
                    guidedPanel.value = parsed.guided || "";
                    freePanel.value = parsed.free || "";
                    status.innerText = "Draft restored from offline storage.";
                } catch (e) {
                    console.error("Error loading saved data", e);
                }
            }

            // Splash Sequence
            setTimeout(() => {
                splash.classList.add('hidden');
                app.style.display = 'flex';
            }, 1500);
        });

        // 4. AUTOSAVE SYSTEM
        function performSave() {
            const dataToSave = {
                guided: guidedPanel.value,
                free: freePanel.value,
                timestamp: new Date().getTime()
            };
            
            localStorage.setItem('marginalia_autosave', JSON.stringify(dataToSave));
            
            status.innerText = "All changes saved locally.";
            status.style.color = "var(--accent)";
        }

        function triggerAutosave() {
            // Immediate feedback
            status.innerText = "Unsaved changes...";
            status.style.color = "orange";

            // Debounce: Wait 1 second after typing stops to write to disk
            clearTimeout(autosaveTimer);
            autosaveTimer = setTimeout(performSave, 1000);
        }

        // 5. NEW PROJECT LOGIC
        btnNew.addEventListener('click', () => {
            if (confirm("This will permanently delete the current draft. Are you sure?")) {
                // Clear UI
                guidedPanel.value = "";
                freePanel.value = "";
                // Clear Storage
                localStorage.removeItem('marginalia_autosave');
                // Clear status
                status.innerText = "New project started.";
                status.style.color = "var(--accent)";
            }
        });

        // 6. EVENT LISTENERS
        guidedPanel.addEventListener('input', triggerAutosave);
        freePanel.addEventListener('input', triggerAutosave);

    </script>
</body>
</html>
